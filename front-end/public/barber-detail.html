<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Detail - Olulu Cuts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="images/logo.jpg" alt="Logo" width="38" height="38">
        </a>
        <ul class="nav-links">
            <li><a href="find-barber.html">Find Barber</a></li>
            <li><a href="index.html#services">Services</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="index.html#faq">FAQ</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <li><a href="login.html" class="btn-login-signup">Login / Sign Up</a></li>
        </ul>
    </nav>

    <main class="detail-card">
        <div class="info-side">
            <h2>Barber’s Detail</h2>
            <div class="stats-box">
                <p><strong>Name:</strong> <span id="db-name"></span></p>
                <p><strong>Age:</strong> <span id="db-age"></span></p>
                <p><strong>Experience:</strong> <span id="db-exp"></span> yrs.</p>
                <p><strong>Contact:</strong> <span id="db-phone"></span></p>
                <p><strong>Barber’s message:</strong> <em id="db-message"></em></p>
            </div>
         <a href="booking.html" id="booking-btn" class="btn-book">BOOK NOW</a>

            <!-- START: COMMENT FEATURE -->
            <section class="review-section card mt-4 p-3 border-0 shadow-sm bg-light" id="review-section">
                <h3 class="h5 mb-2">Review</h3>

                <div class="review-average text-primary fw-semibold mb-3" id="review-average">Rating: 0.00 / 5 (0 reviews)</div>

                <form id="comment-form" class="d-flex flex-column gap-2">
                    <div class="star-row d-flex align-items-center flex-wrap gap-2">
                        <span class="star-label fw-semibold">Your rating:</span>
                        <div class="star-input-group" role="radiogroup" aria-label="Select rating">
                            <input type="radio" id="star-1" name="rating" value="1" required>
                            <label for="star-1" title="1 star">★</label>

                            <input type="radio" id="star-2" name="rating" value="2" required>
                            <label for="star-2" title="2 stars">★</label>

                            <input type="radio" id="star-3" name="rating" value="3" required>
                            <label for="star-3" title="3 stars">★</label>

                            <input type="radio" id="star-4" name="rating" value="4" required>
                            <label for="star-4" title="4 stars">★</label>

                            <input type="radio" id="star-5" name="rating" value="5" required>
                            <label for="star-5" title="5 stars">★</label>
                        </div>
                    </div>

                    <textarea
                        id="comment-text"
                        class="comment-box form-control"
                        rows="3"
                        maxlength="400"
                        placeholder="Write your comment..."
                        required
                    ></textarea>

                    <div id="comment-error" class="comment-error text-danger fw-semibold" style="display:none;"></div>
                    <button type="submit" class="btn btn-primary rounded-pill px-4 fw-semibold align-self-start">Submit Review</button>
                </form>

                <div id="comments-list" class="comments-list list-group mt-3"></div>
            </section>
            <!-- END: COMMENT FEATURE -->
        </div>

        <div class="profile-side">
            <img id="barber-photo" src="images/placeholder.jpg" alt="Barber Profile">
            <div id="barber-name-large" class="highlight-name">...</div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-links">
            <a href="#">PRIVACY POLICY</a>
            <a href="#">TERMS</a>
        </div>
        <div class="footer-socials" aria-label="Social media links">
            <a href="#" aria-label="Facebook"><img src="images/footer_icons/facebook.png" alt="Facebook"></a>
            <a href="#" aria-label="Twitter"><img src="images/footer_icons/twitter.png" alt="Twitter"></a>
            <a href="#" aria-label="Instagram"><img src="images/footer_icons/insta.png" alt="Instagram"></a>
            <a href="#" aria-label="LinkedIn"><img src="images/footer_icons/linkedin.png" alt="LinkedIn"></a>
            <span class="footer-copyright">© Copyright 2026</span>
        </div>
    </footer>

    <script src="js/comment.js"></script>
    <script src="js/barber-details.js"></script>
</body>
</html>
