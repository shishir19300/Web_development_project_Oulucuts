<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oulu Cuts - Login</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <section class="login-shell">
    <div class="shell-topbar">
      <span class="shell-dot"></span>
      <span class="shell-dot"></span>
      <span class="shell-dot"></span>
      <span class="shell-line"></span>
    </div>

    <div class="login-panel d-flex justify-content-center">
      <div class="w-100 login-form-wrap">
        <h1 class="h6 text-center fw-bold mb-3">Login to Your OULUCUTS Account</h1>

        <form id="login-form">
          <div class="mb-2">
            <label class="visually-hidden" for="login-username">Username</label>
            <input id="login-username" type="text" class="form-control form-pill" placeholder="Username">
          </div>

          <div class="mb-3">
            <label class="visually-hidden" for="login-password">Password</label>
            <input id="login-password" type="password" class="form-control form-pill" placeholder="Password">
          </div>
            <div id="error-msg" style="display: none; color: red; text-align: center; margin-bottom: 10px;"></div>
  <div id="success-msg" style="display: none; color: green; text-align: center; margin-bottom: 10px;"></div>
          <div class="d-grid gap-2 justify-content-center">
            <button type="submit" class="btn btn-dark btn-pill px-3 py-1">Sign in</button>
            <a href="signup.html" class="btn btn-outline-dark btn-pill px-3 py-1">Sign up</a>
          </div>
        </form>
      </div>
    </div>
  </section>
  <script src="js/login.js"></script>
</body>
</html>
