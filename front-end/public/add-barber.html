<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Barber</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <div class="booking-card">

    <h2>Add Barber</h2>
    <div class="barber-info">Admin Panel</div>
    <div id="load-error" style="color: red; display: none; margin-bottom: 10px; text-align: center;"></div>
    <div id="add-error" style="color: red; display: none; margin-bottom: 10px; text-align: center;"></div>
    <div id="add-success" style="color: green; display: none; margin-bottom: 10px; text-align: center;"></div>
 
    <form id="add-barber-form">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" id="barber-name" class="form-control" />
      </div>

     
      <div class="mb-3" style="display:flex; gap:10px;">
        
        <div style="flex:1;">
          <label class="form-label">Age</label>
          <input type="number" id="barber-age" class="form-control" />
        </div>

        <div style="flex:1;">
          <label class="form-label">Experience</label>
          <input type="number" id="barber-experience" class="form-control" />
        </div>

      </div>

      
      <div class="mb-3">
        <label class="form-label">Phone</label>
        <input type="tel" id="barber-phone" class="form-control" />
      </div>

      
      <div class="mb-3">
        <label class="form-label">Special Message</label>
        <input type="text" id="barber-special-message" class="form-control" />
      </div>

      
      <div class="mb-3">
        <label class="form-label">Upload Image</label>
        <input type="file" id="barber-photo" class="form-control" />
      </div>

    
      <button type="submit" class="btn-confirm">ADD BARBER</button>
    </form>

  </div>
<script src="js/config.js"></script>
<script src="js/adminbarber.js"></script>
</body>
</html>
