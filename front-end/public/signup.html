<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oulu Cuts - Sign Up</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <section class="signup-shell">
    <div class="shell-topbar">
      <span class="shell-dot"></span>
      <span class="shell-dot"></span>
      <span class="shell-dot"></span>
      <span class="shell-line"></span>
    </div>

    <div class="signup-panel d-flex justify-content-center">
      <div class="w-100 signup-form-wrap">
        <h1 class="h6 text-center fw-bold mb-3">Create Your OULUCUTS Account</h1>

        <form id="signup-form">
          <div class="mb-2">
            <label class="visually-hidden" for="signup-username">Type Your Username</label>
            <input id="signup-username" type="text" class="form-control form-pill" placeholder="Type Your Username" required>
          </div>

          <div class="mb-2">
            <label class="visually-hidden" for="signup-password">Create a Password</label>
            <input id="signup-password" type="password" class="form-control form-pill" placeholder="Create a Password" required>
          </div>

          <div class="mb-2">
            <label class="visually-hidden" for="signup-age">Age</label>
            <input id="signup-age" type="number" class="form-control form-pill" placeholder="Age" min="1" max="120" required>
          </div>

          <fieldset class="gender-group mb-3">
            <legend class="gender-label">Gender</legend>
            <div class="gender-options">
              <label class="gender-option">
                <input type="radio" name="gender" value="male" required>
                <span>Male</span>
              </label>
              <label class="gender-option">
                <input type="radio" name="gender" value="female" required>
                <span>Female</span>
              </label>
              <label class="gender-option">
                <input type="radio" name="gender" value="others" required>
                <span>Others</span>
              </label>
            </div>
          </fieldset>
          <div id="error-msg" style="display: none; color: #ff4444; text-align: center; margin-bottom: 10px; font-weight: bold;"></div>
<div id="success-msg" style="display: none; color: #28a745; text-align: center; margin-bottom: 10px; font-weight: bold;"></div>
          <div class="d-grid justify-content-center">
            <button type="submit" class="btn btn-dark btn-pill px-3 py-1">Create Account</button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <script src="js/signup.js"></script>
</body>
</html>
