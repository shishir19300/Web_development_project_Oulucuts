<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oulu Cuts - Login</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <style>
    body {
      min-height: 100vh;
      background-color: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-shell {
      width: 100%;
      max-width: 380px;
      border-radius: 7px;
      overflow: hidden;
      box-shadow: 0 7px 20px rgba(0, 0, 0, 0.2);
      background: #dce3eb;
    }

    .shell-topbar {
      background: #4f5660;
      height: 20px;
      display: flex;
      align-items: center;
      padding: 0 7px;
      gap: 4px;
    }

    .shell-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #eef2f6;
      opacity: 0.95;
    }

    .shell-line {
      flex: 1;
      height: 5px;
      border-radius: 999px;
      background: #eef2f6;
      margin-left: 5px;
      max-width: 230px;
    }

    .login-panel {
      padding: 21px 12px 23px;
    }

    .form-pill {
      border-radius: 999px;
      border: 0;
      background: #4f5660;
      color: #ffffff;
      font-weight: 600;
      padding: 6px 9px;
    }

    .form-pill::placeholder {
      color: #f1f3f5;
      opacity: 0.95;
    }

    .btn-pill {
      border-radius: 999px;
      min-width: 95px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="login-shell">
    <div class="shell-topbar">
      <span class="shell-dot"></span>
      <span class="shell-dot"></span>
      <span class="shell-dot"></span>
      <span class="shell-line"></span>
    </div>

    <div class="login-panel d-flex justify-content-center">
      <div class="w-100" style="max-width: 230px;">
        <h1 class="h6 text-center fw-bold mb-3">Login to Your OULUCUTS Account</h1>

        <form>
          <div class="mb-2">
            <label class="visually-hidden" for="username">Username</label>
            <input id="username" type="text" class="form-control form-pill" placeholder="Username">
          </div>

          <div class="mb-3">
            <label class="visually-hidden" for="password">Password</label>
            <input id="password" type="password" class="form-control form-pill" placeholder="Password">
          </div>

          <div class="d-grid gap-2 justify-content-center">
            <button type="submit" class="btn btn-dark btn-pill px-3 py-1">Sign in</button>
            <button type="button" class="btn btn-outline-dark btn-pill px-3 py-1">Sign up</button>
          </div>
        </form>
      </div>
    </div>
  </section>
</body>
</html>
